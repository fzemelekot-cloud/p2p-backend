name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  verify-codebase:
    name: Validate, Lint, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Context
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: p2p-backend/package-lock.json

      - name: Install Project Dependencies
        working-directory: ./p2p-backend
        run: npm ci

      - name: Run ESLint Verification
        working-directory: ./p2p-backend
        run: npm run lint

      - name: Execute Automated Unit Tests
        working-directory: ./p2p-backend
        run: npm run test

      - name: Compile Production NestJS Build
        working-directory: ./p2p-backend
        run: npm run build